    <circle cx="980" cy="70" r="1.3"/><circle cx="1130" cy="110" r="1"/><circle cx="200" cy="130" r="1"/><circle cx="660" cy="120" r="1"/>
    <circle cx="880" cy="700" r="1"/><circle cx="120" cy="690" r="1.2"/><circle cx="420" cy="720" r="1"/><circle cx="1050" cy="680" r="1.2"/>
