<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A1026"/><stop offset="1" stop-color="#121B3A"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8a6d1f"/><stop offset="0.5" stop-color="#D4AF37"/><stop offset="1" stop-color="#F0D98C"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg2)"/>
  <g fill="#F2ECD9" opacity="0.5">
    <circle cx="150" cy="50" r="1.2"/><circle cx="420" cy="70" r="1"/><circle cx="700" cy="45" r="1.3"/><circle cx="1000" cy="65" r="1"/><circle cx="880" cy="120" r="1"/><circle cx="260" cy="660" r="1"/><circle cx="1090" cy="640" r="1.2"/>
  </g>
  <text x="600" y="58" text-anchor="middle" fill="#F0D98C" font-size="30" letter-spacing="5" font-weight="bold">SESSION ONE &#183; THE NINE-DAY JOURNEY</text>
  <text x="600" y="88" text-anchor="middle" fill="#F2ECD9" font-size="15" letter-spacing="2">FOUNDATIONS &amp; AUTHORITY &#183; DAYS 1&#8211;9 OF 66</text>
  <line x1="200" y1="106" x2="1000" y2="106" stroke="url(#gold2)" stroke-width="1.5"/>

  <!-- serpentine path: row1 days 1-5, row2 days 9-6 -->
  <path d="M 140 230 H 1060 Q 1110 230 1110 300 V 380 Q 1110 450 1060 450 H 140" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.7"/>

  <!-- Row 1: Days 1-5 -->
  <g text-anchor="middle">
    <g>
      <circle cx="180" cy="230" r="34" fill="#16224A" stroke="#F0D98C" stroke-width="2"/>
      <text x="180" y="238" fill="#F0D98C" font-size="22" font-weight="bold">1</text>
      <text x="180" y="290" fill="#F2ECD9" font-size="13" font-weight="bold">Full Intake</text>
      <text x="180" y="308" fill="#8A93B8" font-size="11.5">Read the whole teaching</text>
      <text x="180" y="323" fill="#8A93B8" font-size="11.5">Learn the Names</text>
    </g>
    <g>
      <circle cx="390" cy="230" r="34" fill="#16224A" stroke="#F0D98C" stroke-width="2"/>
      <text x="390" y="238" fill="#F0D98C" font-size="22" font-weight="bold">2</text>
      <text x="390" y="290" fill="#F2ECD9" font-size="13" font-weight="bold">The Names</text>
      <text x="390" y="308" fill="#8A93B8" font-size="11.5">AhaYah &#183; Yasha</text>
      <text x="390" y="323" fill="#8A93B8" font-size="11.5">Ruach haKodesh &#183; Adon</text>
    </g>
    <g>
      <circle cx="600" cy="230" r="34" fill="#16224A" stroke="#F0D98C" stroke-width="2"/>
      <text x="600" y="238" fill="#F0D98C" font-size="22" font-weight="bold">3</text>
      <text x="600" y="290" fill="#F2ECD9" font-size="13" font-weight="bold">What Deliverance Is</text>
      <text x="600" y="308" fill="#8A93B8" font-size="11.5">Body, soul &amp; spirit</text>
      <text x="600" y="323" fill="#8A93B8" font-size="11.5">Isa 61:1 &#183; Lk 4:14&#8211;21</text>
    </g>
    <g>
      <circle cx="810" cy="230" r="34" fill="#16224A" stroke="#F0D98C" stroke-width="2"/>
      <text x="810" y="238" fill="#F0D98C" font-size="22" font-weight="bold">4</text>
      <text x="810" y="290" fill="#F2ECD9" font-size="13" font-weight="bold">Kingdom of Light</text>
      <text x="810" y="308" fill="#8A93B8" font-size="11.5">Faith, love, joy,</text>
      <text x="810" y="323" fill="#8A93B8" font-size="11.5">peace &amp; hope</text>
    </g>
    <g>
      <circle cx="1020" cy="230" r="34" fill="#16224A" stroke="#F0D98C" stroke-width="2"/>
      <text x="1020" y="238" fill="#F0D98C" font-size="22" font-weight="bold">5</text>
      <text x="1020" y="290" fill="#F2ECD9" font-size="13" font-weight="bold">The Illegal Realm</text>
      <text x="1020" y="308" fill="#8A93B8" font-size="11.5">Exposing the adversary&#8217;s</text>
      <text x="1020" y="323" fill="#8A93B8" font-size="11.5">bondage &#183; 1 Jn 5:19</text>
    </g>
  </g>

  <!-- Row 2: Days 6-9 (right to left) -->
  <g text-anchor="middle">
    <g>
      <circle cx="1020" cy="450" r="34" fill="#16224A" stroke="#F0D98C" stroke-width="2"/>
      <text x="1020" y="458" fill="#F0D98C" font-size="22" font-weight="bold">6</text>
      <text x="1020" y="510" fill="#F2ECD9" font-size="13" font-weight="bold">Authority in His Name</text>
      <text x="1020" y="528" fill="#8A93B8" font-size="11.5">Matt 28:18&#8211;20</text>
      <text x="1020" y="543" fill="#8A93B8" font-size="11.5">The Great Commission</text>
    </g>
    <g>
      <circle cx="740" cy="450" r="34" fill="#16224A" stroke="#F0D98C" stroke-width="2"/>
      <text x="740" y="458" fill="#F0D98C" font-size="22" font-weight="bold">7</text>
      <text x="740" y="510" fill="#F2ECD9" font-size="13" font-weight="bold">NOW Authority</text>
      <text x="740" y="528" fill="#8A93B8" font-size="11.5">Through Ruach, the Word</text>
      <text x="740" y="543" fill="#8A93B8" font-size="11.5">&amp; prayer &#8212; not the flesh</text>
    </g>
    <g>
      <circle cx="460" cy="450" r="34" fill="#16224A" stroke="#F0D98C" stroke-width="2"/>
      <text x="460" y="458" fill="#F0D98C" font-size="22" font-weight="bold">8</text>
      <text x="460" y="510" fill="#F2ECD9" font-size="13" font-weight="bold">Review &amp; Report</text>
      <text x="460" y="528" fill="#8A93B8" font-size="11.5">Self-examination report</text>
      <text x="460" y="543" fill="#8A93B8" font-size="11.5">submitted to ministry</text>
    </g>
    <g>
      <circle cx="180" cy="450" r="38" fill="#D4AF37"/>
      <text x="180" y="458" fill="#0A1026" font-size="22" font-weight="bold">9</text>
      <text x="180" y="514" fill="#F0D98C" font-size="13" font-weight="bold">The Gate &#183; Quiz Day</text>
      <text x="180" y="532" fill="#8A93B8" font-size="11.5">50 questions &#183; pass 80%</text>
      <text x="180" y="547" fill="#8A93B8" font-size="11.5">3 attempts &#183; unlocks Session 2</text>
    </g>
  </g>

  <rect x="200" y="600" width="800" height="58" rx="8" fill="#0E1530" stroke="url(#gold2)" stroke-width="1.5"/>
  <text x="600" y="624" text-anchor="middle" fill="#F0D98C" font-size="13" font-weight="bold" letter-spacing="1">DAILY WORK IS NOT OPTIONAL</text>
  <text x="600" y="644" text-anchor="middle" fill="#F2ECD9" font-size="12">Habits are broken and rebuilt by daily repetition &#8212; be transformed by the renewing of your mind. Romans 12:2</text>
</svg>
