<svg viewBox="0 0 1200 740" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A1026"/><stop offset="1" stop-color="#121B3A"/>
    </linearGradient>
    <linearGradient id="gold3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8a6d1f"/><stop offset="0.5" stop-color="#D4AF37"/><stop offset="1" stop-color="#F0D98C"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="740" fill="url(#bg3)"/>
  <g fill="#F2ECD9" opacity="0.5">
    <circle cx="120" cy="55" r="1.2"/><circle cx="500" cy="40" r="1"/><circle cx="900" cy="60" r="1.3"/><circle cx="1100" cy="100" r="1"/><circle cx="300" cy="700" r="1"/><circle cx="980" cy="690" r="1.2"/>
  </g>
  <text x="600" y="58" text-anchor="middle" fill="#F0D98C" font-size="30" letter-spacing="5" font-weight="bold">STRONGHOLD IDENTIFICATION</text>
  <text x="600" y="88" text-anchor="middle" fill="#F2ECD9" font-size="15" letter-spacing="2">COMMON SIGNS &amp; MANIFESTATIONS &#183; SOUL &#8211; BODY &#8211; SPIRIT</text>
  <line x1="200" y1="106" x2="1000" y2="106" stroke="url(#gold3)" stroke-width="1.5"/>

  <!-- three columns -->
  <!-- SOUL -->
  <g>
    <rect x="70" y="150" width="330" height="430" rx="10" fill="#16224A" stroke="#D4AF37" stroke-width="1.5"/>
    <rect x="70" y="150" width="330" height="52" rx="10" fill="#D4AF37"/>
    <text x="235" y="183" text-anchor="middle" fill="#0A1026" font-size="19" font-weight="bold" letter-spacing="3">SOUL</text>
    <text x="235" y="228" text-anchor="middle" fill="#F0D98C" font-size="13" font-style="italic">Mental &amp; emotional oppression</text>
    <g fill="#F2ECD9" font-size="13">
      <text x="100" y="262">&#8226; Intense, irrational fear</text>
      <text x="100" y="290">&#8226; Chronic hopelessness</text>
      <text x="100" y="318">&#8226; Severe doubts</text>
      <text x="100" y="346">&#8226; Intrusive, negative thoughts</text>
      <text x="100" y="374">&#8226; Constant accusations of self &amp; others</text>
      <text x="100" y="402">&#8226; Extreme restlessness</text>
      <text x="100" y="430">&#8226; Inability to focus</text>
      <text x="100" y="458">&#8226; Strong pull toward forbidden</text>
      <text x="112" y="476">things and/or the occult</text>
      <text x="100" y="504">&#8226; Depression</text>
    </g>
  </g>
  <!-- BODY -->
  <g>
    <rect x="435" y="150" width="330" height="430" rx="10" fill="#16224A" stroke="#D4AF37" stroke-width="1.5"/>
    <rect x="435" y="150" width="330" height="52" rx="10" fill="#D4AF37"/>
    <text x="600" y="183" text-anchor="middle" fill="#0A1026" font-size="19" font-weight="bold" letter-spacing="3">BODY</text>
    <text x="600" y="228" text-anchor="middle" fill="#F0D98C" font-size="13" font-style="italic">Behavioral mannerisms</text>
    <g fill="#F2ECD9" font-size="13">
      <text x="465" y="262">&#8226; Compulsion to sin</text>
      <text x="465" y="290">&#8226; Iniquitous &amp; generational sin</text>
      <text x="465" y="318">&#8226; Stirring up conflict</text>
      <text x="465" y="346">&#8226; Gossip</text>
      <text x="465" y="374">&#8226; Causing division</text>
      <text x="465" y="402">&#8226; Increased hostility toward God</text>
      <text x="477" y="420">or deliverance ministers</text>
      <text x="465" y="448">&#8226; Withdrawing from others</text>
    </g>
  </g>
  <!-- SPIRIT -->
  <g>
    <rect x="800" y="150" width="330" height="430" rx="10" fill="#16224A" stroke="#D4AF37" stroke-width="1.5"/>
    <rect x="800" y="150" width="330" height="52" rx="10" fill="#D4AF37"/>
    <text x="965" y="183" text-anchor="middle" fill="#0A1026" font-size="19" font-weight="bold" letter-spacing="3">SPIRIT</text>
    <text x="965" y="228" text-anchor="middle" fill="#F0D98C" font-size="13" font-style="italic">Spiritual oppression &amp; torment</text>
    <g fill="#F2ECD9" font-size="13">
      <text x="830" y="262">&#8226; Procrastination</text>
      <text x="830" y="290">&#8226; Feeling oppressed &amp; depressed</text>
      <text x="830" y="318">&#8226; Extreme heaviness</text>
      <text x="830" y="346">&#8226; Hindered in serving God</text>
      <text x="830" y="374">&#8226; Sense of powerlessness</text>
      <text x="830" y="402">&#8226; Overall fatigue &amp; tiredness</text>
      <text x="830" y="430">&#8226; Physical limitations that cannot</text>
      <text x="842" y="448">be medically diagnosed</text>
    </g>
  </g>

  <rect x="160" y="618" width="880" height="84" rx="8" fill="#0E1530" stroke="url(#gold3)" stroke-width="1.5"/>
  <text x="600" y="646" text-anchor="middle" fill="#F0D98C" font-size="13" font-weight="bold" letter-spacing="1">OPPRESSION vs. POSSESSION</text>
  <text x="600" y="668" text-anchor="middle" fill="#F2ECD9" font-size="12.5">Oppression is ongoing influence and attack &#183; possession is more complete control &#8212; both are overcome through Christ. Romans 8:37</text>
  <text x="600" y="690" text-anchor="middle" fill="#8A93B8" font-size="12">Believers cannot be possessed. 1 John 4:4 &#183; 1 Corinthians 3:16 &#183; Ephesians 1:13&#8211;14</text>
</svg>
