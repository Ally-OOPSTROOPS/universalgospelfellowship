<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A1026"/><stop offset="1" stop-color="#121B3A"/>
    </linearGradient>
    <linearGradient id="gold4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8a6d1f"/><stop offset="0.5" stop-color="#D4AF37"/><stop offset="1" stop-color="#F0D98C"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4AF37"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="url(#bg4)"/>
  <g fill="#F2ECD9" opacity="0.5">
    <circle cx="140" cy="50" r="1.2"/><circle cx="520" cy="40" r="1"/><circle cx="930" cy="60" r="1.3"/><circle cx="1080" cy="110" r="1"/><circle cx="240" cy="680" r="1"/><circle cx="1010" cy="670" r="1.2"/>
  </g>
  <text x="600" y="58" text-anchor="middle" fill="#F0D98C" font-size="30" letter-spacing="5" font-weight="bold">THE DELIVERANCE PROCESS</text>
  <text x="600" y="88" text-anchor="middle" fill="#F2ECD9" font-size="15" letter-spacing="2">FROM SELF-EXAMINATION TO SUSTAINED FREEDOM IN YASHA</text>
  <line x1="200" y1="106" x2="1000" y2="106" stroke="url(#gold4)" stroke-width="1.5"/>

  <!-- Row 1: steps 1-3 -->
  <g text-anchor="middle">
    <rect x="80" y="170" width="280" height="110" rx="10" fill="#16224A" stroke="#D4AF37" stroke-width="1.5"/>
    <text x="220" y="200" fill="#F0D98C" font-size="15" font-weight="bold">1 &#183; SELF-EXAMINATION</text>
    <text x="220" y="224" fill="#F2ECD9" font-size="12.5">Humble yourself before AhaYah;</text>
    <text x="220" y="242" fill="#F2ECD9" font-size="12.5">confess known, unknown &amp; hidden sin</text>
    <text x="220" y="264" fill="#8A93B8" font-size="11.5" font-style="italic">Godly sorrow leads to repentance &#183; 2 Cor 7:10</text>

    <rect x="460" y="170" width="280" height="110" rx="10" fill="#16224A" stroke="#D4AF37" stroke-width="1.5"/>
    <text x="600" y="200" fill="#F0D98C" font-size="15" font-weight="bold">2 &#183; REPENTANCE</text>
    <text x="600" y="224" fill="#F2ECD9" font-size="12.5">Turn from sin, turn back to AhaYah &#8212;</text>
    <text x="600" y="242" fill="#F2ECD9" font-size="12.5">through every level, until irrevocable</text>
    <text x="600" y="264" fill="#8A93B8" font-size="11.5" font-style="italic">Nacham &#183; Shuwb &#183; Metanoia &#183; Ametameletos</text>

    <rect x="840" y="170" width="280" height="110" rx="10" fill="#16224A" stroke="#D4AF37" stroke-width="1.5"/>
    <text x="980" y="200" fill="#F0D98C" font-size="15" font-weight="bold">3 &#183; FORGIVENESS</text>
    <text x="980" y="224" fill="#F2ECD9" font-size="12.5">Forgive all who have harmed you &#8212;</text>
    <text x="980" y="242" fill="#F2ECD9" font-size="12.5">it releases you from the tormentors</text>
    <text x="980" y="264" fill="#8A93B8" font-size="11.5" font-style="italic">If you do not forgive&#8230; Matthew 6:14&#8211;15</text>
  </g>
  <line x1="360" y1="225" x2="452" y2="225" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="740" y1="225" x2="832" y2="225" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- down connector -->
  <path d="M 980 280 V 330 H 220 V 372" fill="none" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Row 2: steps 4-6 -->
  <g text-anchor="middle">
    <rect x="80" y="380" width="280" height="110" rx="10" fill="#16224A" stroke="#D4AF37" stroke-width="1.5"/>
    <text x="220" y="410" fill="#F0D98C" font-size="15" font-weight="bold">4 &#183; RENUNCIATION</text>
    <text x="220" y="434" fill="#F2ECD9" font-size="12.5">Renounce evil; break all vows, pacts</text>
    <text x="220" y="452" fill="#F2ECD9" font-size="12.5">&amp; partnerships; command spirits</text>
    <text x="220" y="470" fill="#F2ECD9" font-size="12.5">to leave in Yasha&#8217;s Name</text>

    <rect x="460" y="380" width="280" height="110" rx="10" fill="#16224A" stroke="#D4AF37" stroke-width="1.5"/>
    <text x="600" y="410" fill="#F0D98C" font-size="15" font-weight="bold">5 &#183; BE FILLED</text>
    <text x="600" y="434" fill="#F2ECD9" font-size="12.5">Fill every cleansed space with</text>
    <text x="600" y="452" fill="#F2ECD9" font-size="12.5">Ruach HaKodesh &amp; AhaYah&#8217;s truth &#8212;</text>
    <text x="600" y="470" fill="#F2ECD9" font-size="12.5">or the enemy returns. Matt 12:43&#8211;45</text>

    <rect x="840" y="380" width="280" height="110" rx="10" fill="#16224A" stroke="#D4AF37" stroke-width="1.5"/>
    <text x="980" y="410" fill="#F0D98C" font-size="15" font-weight="bold">6 &#183; INNER HEALING</text>
    <text x="980" y="434" fill="#F2ECD9" font-size="12.5">Mend the broken heart; sever ungodly</text>
    <text x="980" y="452" fill="#F2ECD9" font-size="12.5">soul ties; replace lies with truth</text>
    <text x="980" y="470" fill="#8A93B8" font-size="11.5" font-style="italic">John 8:31&#8211;32 &#183; Romans 12:2</text>
  </g>
  <line x1="360" y1="435" x2="452" y2="435" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="740" y1="435" x2="832" y2="435" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- down to maintenance -->
  <path d="M 980 490 V 540 H 600 V 560" fill="none" stroke="#D4AF37" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Maintenance band -->
  <rect x="160" y="566" width="880" height="110" rx="10" fill="#0E1530" stroke="url(#gold4)" stroke-width="2"/>
  <text x="600" y="596" text-anchor="middle" fill="#F0D98C" font-size="16" font-weight="bold" letter-spacing="2">7 &#183; MAINTAIN FREEDOM &#8212; A DAILY LIFESTYLE, NOT A ONE-TIME EVENT</text>
  <text x="600" y="622" text-anchor="middle" fill="#F2ECD9" font-size="12.5">Daily dying to self &#183; daily Scripture &amp; prayer &#183; fasting &#183; worship &#183; fellowship with mature believers &#183; closing doors on old habits</text>
  <text x="600" y="644" text-anchor="middle" fill="#F2ECD9" font-size="12.5">Daily put on the Armor of AhaYah and be continually refilled with Ruach HaKodesh</text>
  <text x="600" y="666" text-anchor="middle" fill="#8A93B8" font-size="11.5" font-style="italic">Matthew 6:33 &#183; Ephesians 5:18 &#183; Ephesians 6:10&#8211;19 &#183; Colossians 3:1&#8211;3</text>
</svg>
